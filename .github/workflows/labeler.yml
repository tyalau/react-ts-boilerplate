name: "Pull Request Labeler"
on:
  pull_request:
      types: [opened, synchronize, reopened]

jobs:
  labeler:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Label Dev Ops
      uses: actions/labeler@v6
      with:
        sync-labels: true
